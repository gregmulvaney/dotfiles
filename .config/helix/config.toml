theme = "catppuccin_mocha"

[editor]
line-number = "relative"
mouse = true
cursorline = true
color-modes = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true 

[editor.lsp]
display-messages = true
snippets = true

[keys.normal]
C-s = ":w"

[keys.insert]
j = {j = "normal_mode"}
