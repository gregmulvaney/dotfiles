theme = "catppuccin_mocha"

[editor]
# Disabled due to weird rendering on window focus
#line-number = "relative"
mouse = true
cursorline = true
color-modes = true
true-color = true
completion-timeout = 150

[editor.statusline]
left = [
  "mode",
  "separator",
  "version-control",
  "separator",
  "file-name",
  "file-modification-indicator",
]
right = [
  "diagnostics",
  "selections",
  "position",
  "file-encoding",
  "file-line-ending",
  "file-type",
]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.indent-guides]
render = true
skip-levels = 1

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false
ignore = true

[editor.lsp]
display-messages = true
snippets = true
display-inlay-hints = false

[keys.normal]
C-s = ":w"

[keys.normal.space]
i = ":toggle lsp.display-inlay-hints"

[keys.insert]
j = { j = "normal_mode" }
